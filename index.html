<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberBiz 對帳銷帳</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft JhengHei","Noto Sans TC","Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a1a}
.hd{background:#2c3e50;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hd h1{font-size:17px;font-weight:700}
.hd .sub{font-size:11px;color:#95a5c6}
.main{max-width:1280px;margin:0 auto;padding:20px}
/* toolbar */
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.btn-add{background:#27ae60;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-add:hover{background:#219a52}
.btn-add svg{width:16px;height:16px}
.toolbar input[type=file]{display:none}
.toolbar .stats{font-size:12px;color:#666;margin-left:auto}
.toolbar .stats b{color:#d35400}
/* table */
.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tbl thead{background:#34495e;color:#fff}
.tbl th{padding:9px 10px;font-size:11px;font-weight:600;text-align:left;white-space:nowrap}
.tbl td{padding:9px 10px;font-size:12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.tbl tr:hover{background:#fafbfc}
.tbl .r{text-align:right}
.amt{font-weight:700;font-variant-numeric:tabular-nums;color:#c0392b}
.chip{display:inline-block;background:#f0f4f8;border-radius:4px;padding:1px 6px;margin:1px 2px;font-size:10px;font-weight:600;color:#2c3e50}
.chip em{font-style:normal;font-weight:400;color:#888;margin-left:2px;font-size:9px}
.est{font-size:11px;color:#555;white-space:nowrap}
.zero td{color:#ccc}
.badge-ok{display:inline-block;background:#27ae60;color:#fff;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600}
.badge-wait{display:inline-block;background:#e67e22;color:#fff;border-radius:4px;padding:2px 8px;font-size:10px}
.erp-no{font-family:monospace;font-size:11px;font-weight:700;color:#2c3e50;margin-left:4px}
.done-row{background:#f0faf0}
/* receipt panel */
.panel{display:none;background:#fff;border:1px solid #ddd;border-radius:8px;margin:4px 0 8px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.panel.open{display:block}
.panel h3{font-size:13px;margin-bottom:10px;color:#2c3e50}
.rtbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px}
.rtbl th{background:#ecf0f1;padding:6px 8px;font-size:10px;text-align:left;border-bottom:2px solid #ddd}
.rtbl td{padding:6px 8px;border-bottom:1px solid #eee}
.rtbl .gb{color:#27ae60;font-weight:700}
.rtbl .ob{color:#e67e22;font-weight:700}
.rtbl .fb td{border-top:2px solid #2c3e50;font-weight:700;background:#fafafa}
.verify{font-size:11px;color:#856404;background:#fdf6ec;padding:6px 10px;border-radius:4px;margin-bottom:8px}
.panel-actions{display:flex;gap:8px}
.btn-sm{border:none;border-radius:4px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;color:#fff}
.btn-copy{background:#3498db}.btn-copy:hover{background:#2980b9}.btn-copy.ok{background:#27ae60}
.btn-print{background:#7f8c8d}.btn-print:hover{background:#6c7a7d}
.foot td{border-top:2px solid #34495e;font-weight:700;background:#fafafa}
@media print{.hd,.toolbar,.panel-actions{display:none!important}.panel.open{box-shadow:none;border:1px solid #ccc}}
@media(max-width:900px){.chip em{display:none}.tbl th:nth-child(5),.tbl td:nth-child(5){display:none}}
</style>
</head>
<body>
<div class="hd">
  <div><h1>CyberBiz 對帳銷帳</h1><div class="sub">CYBERBIZ / 順立智慧（54688786）｜1141 應收帳款｜匯費 15｜+9天週二到帳</div></div>
</div>
<div class="main">
  <div class="toolbar">
    <button class="btn-add" onclick="document.getElementById('fu').click()">

let weeks = [];
const W = 15; // wire fee

// ═══ Init ═══
(function(){
  // merge seed + localStorage
  const saved = JSON.parse(localStorage.getItem('cb_weeks')||'[]');
  const map = new Map();
  [...SEED,...saved].forEach(w => map.set(w.period, w));
  weeks = [...map.values()].sort((a,b) => a.start.localeCompare(b.start));
  render();
})();

// ═══ Upload ═══
document.getElementById('fu').addEventListener('change', e => {
  const files = Array.from(e.target.files).filter(f=>/\.xlsx?$/.test(f.name));
  if(!files.length) return;
  let done=0;
  files.forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        const w = parse(wb);
        if(w) {
          const idx = weeks.findIndex(x=>x.period===w.period);
          if(idx>=0) weeks[idx]=w; else weeks.push(w);
        }
      } catch(err){console.error(file.name,err)}
      if(++done===files.length){
        weeks.sort((a,b)=>a.start.localeCompare(b.start));
        localStorage.setItem('cb_weeks',JSON.stringify(weeks));
        render();
      }
    };
    r.readAsArrayBuffer(file);
  });
  e.target.value='';
});

function parse(wb){
  const s1=wb.Sheets[wb.SheetNames[0]], s2=wb.Sheets[wb.SheetNames[1]];
  if(!s1||!s2) return null;
  const d1=XLSX.utils.sheet_to_json(s1,{header:1,defval:''});
  let period='',fee=0;
  for(const row of d1){
    const a=String(row[0]||''),b=String(row[1]||''),c=parseFloat(row[2])||0;
    if(a.includes('對帳區間')) period=a.replace('對帳區間：','').trim();
    if(b==='本期費用淨額') fee=Math.round(c);
  }
  if(!period) return null;
  const pts=period.split('~').map(s=>s.trim());
  const start=pts[0].replace(/\//g,'-'), end=(pts[1]||pts[0]).replace(/\//g,'-');
  const d2=XLSX.utils.sheet_to_json(s2,{header:1,defval:''});
  const net={};
  for(let i=2;i<d2.length;i++){
    const row=d2[i],no=String(row[0]||'').replace('#',''),col=String(row[5]||''),amt=parseFloat(row[7])||0;
    if(col==='CYBERBIZ'&&no) net[no]=(net[no]||0)+Math.round(amt);
  }
  const orders=Object.entries(net).filter(([,a])=>a>0).sort().map(([o,a])=>({no:o,amt:a}));
  const total=orders.reduce((s,o)=>s+o.amt,0);
  return {period,start,end,total,fee,orders};
}

// ═══ Render ═══
function render(){
  const active=weeks.filter(w=>w.total>0);
  const grand=weeks.reduce((s,w)=>s+w.total,0);
  const nOrders=weeks.reduce((s,w)=>s+w.orders.length,0);
  const dc=weeks.filter(w=>w.total>0&&ERP_MAP[w.period]).length;
  const pc=weeks.filter(w=>w.total>0&&!ERP_MAP[w.period]).length;
  document.getElementById('stats').innerHTML=`${weeks.length} 週 / <b>${nOrders}</b> 筆 / 銷帳 <b>${grand.toLocaleString()}</b> / <span style="color:#27ae60">${dc} 已入帳</span> / <span style="color:#e74c3c">${pc} 待處理</span>`;

  let html='';
  weeks.forEach((w,i)=>{
    const est=remitDate(w.end);
    if(!w.total){
      html+=`<tr class="zero"><td>${i+1}</td><td>${w.period}</td><td class="r">0</td><td class="r">0</td><td>-</td><td><span class="badge-ok">無單</span></td><td>-</td><td></td></tr>`;
      return;
    }
    const erpNo=ERP_MAP[w.period]||'';
    const isDone=!!erpNo;
    const statusHtml=isDone
      ?`<span class="badge-ok">已入帳</span><span class="erp-no">${erpNo}</span>`
      :`<span class="badge-wait">待處理</span>`;
    const actionHtml=isDone
      ?''
      :`<button class="btn-sm btn-copy" onclick="toggle(${i})" style="background:#34495e">收款單</button>`;
    const chips=w.orders.map(o=>`<span class="chip">${o.no}<em>${o.amt.toLocaleString()}</em></span>`).join(' ');
    html+=`<tr class="${isDone?'done-row':''}">
      <td>${i+1}</td>
      <td style="font-weight:600;white-space:nowrap">${w.period}</td>
      <td class="r amt">${w.total.toLocaleString()}</td>
      <td class="r" style="color:#e67e22">${w.fee.toLocaleString()}</td>
      <td class="est">${est}</td>
      <td>${statusHtml}</td>
      <td>${chips}</td>
      <td>${actionHtml}</td>
    </tr>
    ${isDone?'':`<tr><td colspan="8" style="padding:0"><div class="panel" id="p${i}">${receiptPanel(w)}</div></td></tr>`}`;
  });
  const doneCount=weeks.filter(w=>w.total>0&&ERP_MAP[w.period]).length;
  const pendCount=weeks.filter(w=>w.total>0&&!ERP_MAP[w.period]).length;
  html+=`<tr class="foot"><td></td><td>合計</td><td class="r amt">${grand.toLocaleString()}</td><td class="r" style="color:#e67e22">${weeks.reduce((s,w)=>s+w.fee,0).toLocaleString()}</td><td></td><td>${doneCount} 已入 / ${pendCount} 待處理</td><td>${nOrders} 筆</td><td></td></tr>`;
  document.getElementById('tb').innerHTML=html;
}

function receiptPanel(w){
  const bank=w.total-w.fee-W;
  const os=w.orders.map(o=>`${o.no}(${o.amt.toLocaleString()})`).join(' / ');
  const d=remitYMD(w.end);
  const C='54688786', N='CYBERBIZ/順立智慧股份有限公司';
  const memo1=`需手動沖帳 ${os}`.substring(0,100);
  const memo2=`CB${w.period.replace(/\s/g,'')}`.substring(0,20);
  const tsv=[
    [d,'1','11131','1141',C,N,bank,'0',memo1,'',''].join('\t'),
    [d,'1','6135','1141',C,N,'15','0','匯費','',''].join('\t'),
    [d,'1','6135','1141',C,N,w.fee,'0','CB平台手續費','',''].join('\t'),
  ].join('\n');

  return `<h3>收款單 ── ${w.period}（日期 ${d.substring(0,4)}/${d.substring(4,6)}/${d.substring(6)}）</h3>
  <table class="rtbl"><thead><tr><th>#</th><th>收款存摺帳號</th><th>帳號名稱</th><th>科目</th><th>科目名稱</th><th>客戶編碼</th><th>客戶名稱</th><th style="text-align:right">金額</th><th>摘要名稱</th></tr></thead><tbody>
  <tr><td>1</td><td>11131</td><td>銀行存款-龍潭一銀</td><td>1141</td><td>應收帳款</td><td>${C}</td><td>${N}</td><td class="gb" style="text-align:right">${bank.toLocaleString()}</td><td style="font-size:10px"><b style="color:#c0392b">需手動沖帳</b> ${os}</td></tr>
  <tr><td>2</td><td>6135</td><td>手續費</td><td>1141</td><td>應收帳款</td><td>${C}</td><td>${N}</td><td class="ob" style="text-align:right">15</td><td>匯費</td></tr>
  <tr><td>3</td><td>6135</td><td>手續費</td><td>1141</td><td>應收帳款</td><td>${C}</td><td>${N}</td><td class="ob" style="text-align:right">${w.fee.toLocaleString()}</td><td>CB平台手續費</td></tr>
  <tr class="fb"><td></td><td colspan="6">合計</td><td class="amt" style="text-align:right">${w.total.toLocaleString()}</td><td></td></tr>
  </tbody></table>
  <div class="verify">${bank.toLocaleString()} + 15 + ${w.fee.toLocaleString()} = ${w.total.toLocaleString()} ✓</div>
  <div class="panel-actions">
    <button class="btn-sm btn-copy" onclick="copyTSV(this,'${btoa(unescape(encodeURIComponent(tsv)))}')">複製上傳格式</button>
    <button class="btn-sm btn-print" onclick="window.print()">列印</button>
  </div>`;
}

function toggle(i){const p=document.getElementById('p'+i);p.classList.toggle('open')}
function copyTSV(btn,b64){
  const tsv=decodeURIComponent(escape(atob(b64)));
  navigator.clipboard.writeText(tsv).then(()=>{btn.textContent='已複製！';btn.classList.add('ok');setTimeout(()=>{btn.textContent='複製上傳格式';btn.classList.remove('ok')},2000)});
}
function remitDate(pe){
  const p=pe.split(/[-\/]/),end=new Date(+p[0],+p[1]-1,+p[2]),r=new Date(end.getTime()+9*864e5);
  const wd=['日','一','二','三','四','五','六'][r.getDay()];
  return `${r.getFullYear()}/${String(r.getMonth()+1).padStart(2,'0')}/${String(r.getDate()).padStart(2,'0')}（${wd}）`;
}
function remitYMD(pe){
  const p=pe.split(/[-\/]/),end=new Date(+p[0],+p[1]-1,+p[2]),r=new Date(end.getTime()+9*864e5);
  return `${r.getFullYear()}${String(r.getMonth()+1).padStart(2,'0')}${String(r.getDate()).padStart(2,'0')}`;
}
